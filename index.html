<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daikin Market Masters</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f6f6; }
    .wrap { max-width: 860px; margin: auto; padding: 16px; }
    .box { background: #fff; border: 1px solid #ddd; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    input, select, textarea, button {
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 15px;
    }
    textarea { min-height: 80px; }
    button { background: #01696f; color: #fff; border: none; font-weight: bold; cursor: pointer; }
    .danger { background: #f7dfe4; color: #91233a; }
    .row { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
    .msg { display:none; padding:12px; border-radius:10px; margin-bottom:12px; }
    .ok { display:block; background:#e3f5f1; color:#0d4f55; }
    .err { display:block; background:#fbe5e9; color:#91233a; }
    h2, h3 { margin-top: 0; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="box">
    <h2>Daikin Market Masters</h2>
    <div id="msg" class="msg"></div>
  </div>

  <div class="box">
    <h3>One-time basic details</h3>
    <div class="grid">
      <input id="promoterName" placeholder="Promoter Name">
      <input id="employeeCode" placeholder="Promoter Employee Code">
      <input id="storeName" placeholder="Store Name">
      <input id="storeCode" placeholder="Store Code">
      <select id="dealerCategory">
        <option value="">Dealer Category</option>
        <option>NR</option>
        <option>GT</option>
        <option>DSP</option>
        <option>RR</option>
      </select>
      <input id="storeCity" placeholder="Store City">
      <textarea id="storeAddress" placeholder="Store Address" style="grid-column:1/-1;"></textarea>
    </div>
  </div>

  <div class="box">
    <h3>Brand-wise entry</h3>
    <div class="grid">
      <select id="brand">
        <option value="">Select Brand</option>
      </select>

      <select id="segment">
        <option value="">Select Segment</option>
      </select>

      <select id="model">
        <option value="">Select Model</option>
      </select>

      <input id="price" type="number" placeholder="Best Customer Price">
    </div>
    <br>
    <button type="button" onclick="addEntry()">Save This Entry</button>
  </div>

  <div class="box">
    <h3>Saved entries</h3>
    <div id="entries"></div>
  </div>

  <div class="box">
    <h3>Reference Customer Invoices</h3>
    <div class="grid">
      <div style="grid-column:1/-1;">
        <label for="invoiceImages"><b>Upload Reference Customer Invoices</b> (Optional)</label>
        <input id="invoiceImages" type="file" accept="image/*" multiple>
        <small style="display:block;margin-top:6px;color:#666;">
          For each brand-wise saved entry, you can upload up to 7 reference invoice images before clicking Save This Entry.
        </small>
      </div>
      <div id="invoicePreviewContainer" style="grid-column:1/-1; display:flex; flex-wrap:wrap; gap:10px;"></div>
    </div>
  </div>

  <div class="box">
    <h3>Store Information</h3>
    <div class="grid">
      <input id="totalCounterDisplay" type="number" placeholder="Total Counter Split AC Display">
      <input id="daikinSplitDisplay" type="number" placeholder="Daikin Split AC Display">

      <select id="installationCharges">
        <option value="">Installation Charges</option>
        <option>Standard</option>
        <option>Subsidized</option>
        <option>Free</option>
      </select>

      <select id="pinelabActivation">
        <option value="">Pinelab Activation</option>
        <option>Y</option>
        <option>N</option>
      </select>

      <select id="paytmActivation">
        <option value="">Paytm Activation</option>
        <option>Y</option>
        <option>N</option>
      </select>

      <select id="paperFinance">
        <option value="">Paper Finance</option>
        <option>Y</option>
        <option>N</option>
      </select>
    </div>
  </div>

  <div class="box">
    <button type="button" onclick="submitFinal()">Final Submit</button>
  </div>
</div>

let savedEntries = [];
let entryInvoiceImages = [];

function showMsg(text, type='ok') {
  const el = document.getElementById('msg');
  el.className = 'msg ' + (type === 'error' ? 'err' : 'ok');
  el.textContent = text;
}

function getBrands() {
  const brands = new Set();
  Object.keys(modelMaster).forEach(segment => {
    Object.keys(modelMaster[segment]).forEach(brand => brands.add(brand));
  });
  return Array.from(brands).sort();
}

function populateBrands() {
  const brandEl = document.getElementById('brand');
  brandEl.innerHTML = '<option value="">Select Brand</option>';
  getBrands().forEach(brand => {
    const opt = document.createElement('option');
    opt.value = brand;
    opt.textContent = brand;
    brandEl.appendChild(opt);
  });
}

document.getElementById('brand').addEventListener('change', function() {
  const brand = this.value;
  const segmentEl = document.getElementById('segment');
  const modelEl = document.getElementById('model');
  segmentEl.innerHTML = '<option value="">Select Segment</option>';
  modelEl.innerHTML = '<option value="">Select Model</option>';

  if (!brand) return;

  const preferredOrder = ['1/1.2T 3*','1/1.2T 4*','1/1.2T 5*','1.4/1.5T 3*','1.4/1.5T 4*','1.4/1.5T 5*','1.8/2T 3*','1.8/2T 5*','Heavyduty above 2T'];
  preferredOrder.forEach(segment => {
    if (modelMaster[segment] && modelMaster[segment][brand]) {
      const opt = document.createElement('option');
      opt.value = segment;
      opt.textContent = segment;
      segmentEl.appendChild(opt);
    }
  });
});

document.getElementById('segment').addEventListener('change', function() {
  const brand = document.getElementById('brand').value;
  const segment = this.value;
  const modelEl = document.getElementById('model');
  modelEl.innerHTML = '<option value="">Select Model</option>';

  if (!brand || !segment || !modelMaster[segment] || !modelMaster[segment][brand]) return;

  modelMaster[segment][brand].forEach(model => {
    const opt = document.createElement('option');
    opt.value = model;
    opt.textContent = model;
    modelEl.appendChild(opt);
  });
});

document.getElementById('invoiceImages').addEventListener('change', function(event) {
  const files = Array.from(event.target.files || []).slice(0, 7);
  const previewContainer = document.getElementById('invoicePreviewContainer');
  entryInvoiceImages = [];
  previewContainer.innerHTML = '';

  files.forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const result = e.target.result;
      entryInvoiceImages.push({
        base64: result.split(',')[1],
        mimeType: file.type || 'image/jpeg',
        name: file.name || ('invoice_' + Date.now() + '.jpg')
      });
      const img = document.createElement('img');
      img.src = result;
      img.style.maxWidth = '140px';
      img.style.border = '1px solid #ccc';
      img.style.borderRadius = '8px';
      img.style.padding = '4px';
      previewContainer.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
});

function addEntry() {
  const brand = document.getElementById('brand').value.trim();
  const segment = document.getElementById('segment').value.trim();
  const model = document.getElementById('model').value.trim();
  const price = document.getElementById('price').value.trim();

  if (!brand || !segment || !model || !price) {
    showMsg('Please select Brand, Segment, Model and enter Best Customer Price.', 'error');
    return;
  }

  savedEntries.push({
    brand,
    segment,
    model,
    price,
    invoiceImages: entryInvoiceImages.map(img => ({...img}))
  });

  renderEntries();

  document.getElementById('brand').value = '';
  document.getElementById('segment').innerHTML = '<option value="">Select Segment</option>';
  document.getElementById('model').innerHTML = '<option value="">Select Model</option>';
  document.getElementById('price').value = '';
  document.getElementById('invoiceImages').value = '';
  document.getElementById('invoicePreviewContainer').innerHTML = '';
  entryInvoiceImages = [];

  showMsg('Entry saved successfully.');
}

function removeEntry(index) {
  savedEntries.splice(index, 1);
  renderEntries();
}

function renderEntries() {
  const wrap = document.getElementById('entries');
  if (!savedEntries.length) {
    wrap.innerHTML = '<div class="muted">No entries added yet.</div>';
    return;
  }

  wrap.innerHTML = savedEntries.map((entry, idx) => `
    <div style="border:1px solid #ddd; border-radius:10px; padding:10px; margin-bottom:10px;">
      <b>#${idx + 1}</b> | Brand: ${entry.brand} | Segment: ${entry.segment} | Model: ${entry.model} | Price: ${entry.price} | Invoices: ${(entry.invoiceImages || []).length}
      <div style="margin-top:8px;"><button type="button" onclick="removeEntry(${idx})">Delete</button></div>
    </div>
  `).join('');
}

function validateTopDetails() {
  return document.getElementById('promoterName').value.trim() &&
         document.getElementById('employeeCode').value.trim() &&
         document.getElementById('storeName').value.trim() &&
         document.getElementById('storeCode').value.trim() &&
         document.getElementById('dealerCategory').value.trim() &&
         document.getElementById('storeCity').value.trim() &&
         document.getElementById('storeAddress').value.trim();
}
</script>

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBy7bbeyV5Ox8KiNrqDJ5kCVMvFHFv8VLk",

    messagingSenderId: "949190921548",
    appId: "1:949190921548:web:c1c9920190d4fa3ab153e9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.submitToFirebase = async function(payload) {
    try {
      await push(ref(db, 'promoterSubmissions'), payload);
      return { status: 'success' };
    } catch (err) {
      return { status: 'error', message: err.message };
    }
  };
</script>

<script>
async function submitFinal() {
  if (!validateTopDetails()) {
    showMsg('Please fill all one-time basic details.', 'error');
    return;
  }

  const totalCounterDisplay = document.getElementById('totalCounterDisplay').value.trim();
  const daikinSplitDisplay = document.getElementById('daikinSplitDisplay').value.trim();
  const installationCharges = document.getElementById('installationCharges').value.trim();
  const pinelabActivation = document.getElementById('pinelabActivation').value.trim();
  const paytmActivation = document.getElementById('paytmActivation').value.trim();
  const paperFinance = document.getElementById('paperFinance').value.trim();

  if (!totalCounterDisplay || !daikinSplitDisplay || !installationCharges || !pinelabActivation || !paytmActivation || !paperFinance) {
    showMsg('Please fill all Store Information details.', 'error');
    return;
  }

  if (!savedEntries.length) {
    showMsg('Please save at least one brand-wise entry before final submit.', 'error');
    return;
  }

  showMsg('Submitting data, please wait...');

  const payload = {
    submittedAt: new Date().toISOString(),
    promoterName: document.getElementById('promoterName').value.trim(),
    employeeCode: document.getElementById('employeeCode').value.trim(),
    storeName: document.getElementById('storeName').value.trim(),
    storeCode: document.getElementById('storeCode').value.trim(),
    dealerCategory: document.getElementById('dealerCategory').value.trim(),
    storeCity: document.getElementById('storeCity').value.trim(),
    storeAddress: document.getElementById('storeAddress').value.trim(),
    totalCounterDisplay: totalCounterDisplay,
    daikinSplitDisplay: daikinSplitDisplay,
    installationCharges: installationCharges,
    pinelabActivation: pinelabActivation,
    paytmActivation: paytmActivation,
    paperFinance: paperFinance,
    entries: savedEntries
  };

  const result = await window.submitToFirebase(payload);

  if (result.status === 'success') {
    showMsg('Final submission completed successfully.');
    savedEntries = [];
    renderEntries();
    document.getElementById('totalCounterDisplay').value = '';
    document.getElementById('daikinSplitDisplay').value = '';
