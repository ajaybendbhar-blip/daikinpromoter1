<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daikin Market Masters</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0;padding:20px}
    .wrap{max-width:960px;margin:auto;background:#fff;padding:20px;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    h1,h2,h3{margin-top:0;color:#0f4c5c}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    input,select,button{width:100%;padding:12px;border:1px solid #cfd8e3;border-radius:10px;box-sizing:border-box;background:#fff}
    .section{border:1px solid #e3e8ef;border-radius:12px;padding:16px;margin-bottom:16px}
    .msg{display:none;padding:12px;border-radius:10px;margin-bottom:12px}
    .ok{display:block;background:#e8f7ee;color:#126a36}
    .err{display:block;background:#fdecef;color:#a42843}
    .entry{border:1px dashed #c8d1dc;border-radius:10px;padding:12px;margin-top:10px}
    .small{font-size:12px;color:#667085}
    .preview-list div{font-size:12px;padding:4px 0}
    .hidden{display:none !important}
    @media(max-width:768px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Daikin Market Masters</h1>
  <div id="msg" class="msg"></div>

  <div id="loginSection" class="section">
    <h2>Promoter Login</h2>
    <div class="grid">
      <input id="employeeCode" placeholder="Employee Code / Mobile Number">
      <input id="password" type="password" placeholder="Password">
    </div>
    <div style="margin-top:12px"><button onclick="login()">Login</button></div>
  </div>

  <div id="userBar" class="section hidden">
    <div class="grid">
      <input id="loggedPromoter" readonly>
      <input id="loggedStore" readonly>
    </div>
  </div>

  <div id="formArea" class="hidden">
    <div class="section">
      <h2>One-time basic details</h2>
      <div class="grid">
        <input id="promoterName" placeholder="Promoter Name" readonly>
        <input id="storeName" placeholder="Store Name" readonly>
        <input id="storeCode" placeholder="Store Code" readonly>
        <select id="dealerCategory"><option value="">Dealer Category</option><option>NR</option><option>GT</option><option>DSP</option><option>RR</option></select>
        <input id="storeCity" placeholder="Store City" readonly>
        <input id="storeAddress" placeholder="Store Address" readonly>
      </div>
    </div>

    <div class="section">
      <h2>Brand-wise entry</h2>
      <div class="grid">
        <select id="brand"><option value="">Select Brand</option></select>
        <select id="segment"><option value="">Select Segment</option></select>
        <select id="model"><option value="">Select Model Number</option></select>
        <input id="price" placeholder="Best Customer Price">
      </div>
      <div style="margin-top:12px">
        <label class="small">Upload reference customer invoices (up to 7 per entry). Images will be compressed before final submit.</label>
        <input id="invoiceImages" type="file" accept="image/*" multiple>
        <div id="invoicePreview" class="preview-list small"></div>
      </div>
      <div style="margin-top:12px"><button onclick="saveEntry()">Save This Entry</button></div>
      <div id="entriesList"></div>
    </div>

    <div class="section">
      <h2>Store Information</h2>
      <div class="grid">
        <input id="totalCounterDisplay" placeholder="Total Counter Split AC Display">
        <input id="daikinSplitDisplay" placeholder="Daikin Split AC Display">
        <select id="installationCharges"><option value="">Installation Charges</option><option>Standard</option><option>Subsidized</option><option>Free</option></select>
        <select id="pinelabActivation"><option value="">Pinelab Activation</option><option>Y</option><option>N</option></select>
        <select id="paytmActivation"><option value="">Paytm Activation</option><option>Y</option><option>N</option></select>
        <select id="paperFinance"><option value="">Paper Finance</option><option>Y</option><option>N</option></select>
      </div>
    </div>

    <div><button onclick="submitFinal()">Final Submit</button></div>
  </div>
</div>

let savedEntries = [];
let loggedInEmployee = null;
const IMAGE_MAX_WIDTH = 1280;
const IMAGE_MAX_HEIGHT = 1280;
const IMAGE_QUALITY = 0.72;

function showMsg(text, type='ok'){
  const el = document.getElementById('msg');
  el.className = 'msg ' + (type === 'error' ? 'err' : 'ok');
  el.textContent = text;
}

function uniqueBrands(){
  const brands = new Set();
  Object.values(modelMaster).forEach(group => Object.keys(group || {}).forEach(b => brands.add(b)));
  return [...brands].sort();
}

function populateBrandOptions(){
  const brand = document.getElementById('brand');
  brand.innerHTML = '<option value="">Select Brand</option>';
  uniqueBrands().forEach(b => {
    const opt = document.createElement('option');
    opt.value = b;
    opt.textContent = b;
    brand.appendChild(opt);
  });
}

function populateSegmentOptions(){
  const brand = document.getElementById('brand').value;
  const segment = document.getElementById('segment');
  const model = document.getElementById('model');
  segment.innerHTML = '<option value="">Select Segment</option>';
  model.innerHTML = '<option value="">Select Model Number</option>';
  if (!brand) return;
  Object.keys(modelMaster).forEach(seg => {
    if (modelMaster[seg] && modelMaster[seg][brand] && modelMaster[seg][brand].length) {
      const opt = document.createElement('option');
      opt.value = seg;
      opt.textContent = seg;
      segment.appendChild(opt);
    }
  });
}

function populateModels(){
  const brand = document.getElementById('brand').value;
  const segment = document.getElementById('segment').value;
  const model = document.getElementById('model');
  model.innerHTML = '<option value="">Select Model Number</option>';
  if (!brand || !segment || !modelMaster[segment] || !modelMaster[segment][brand]) return;
  modelMaster[segment][brand].forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    model.appendChild(opt);
  });
}

async function login(){
  try {
    const employeeCode = document.getElementById('employeeCode').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!employeeCode || !password) { showMsg('Enter employee code and password', 'error'); return; }
    const res = await fetch(`${APPS_SCRIPT_URL}?employeeCode=${encodeURIComponent(employeeCode)}&password=${encodeURIComponent(password)}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.message || 'Login failed');
    loggedInEmployee = json.employee;
    document.getElementById('promoterName').value = json.employee.promoterName || '';
    document.getElementById('storeName').value = json.employee.storeName || '';
    document.getElementById('storeCode').value = json.employee.storeCode || '';
    document.getElementById('dealerCategory').value = json.employee.dealerCategory || '';
    document.getElementById('storeCity').value = json.employee.storeCity || '';
    document.getElementById('storeAddress').value = json.employee.storeAddress || '';
    document.getElementById('loggedPromoter').value = 'Promoter: ' + (json.employee.promoterName || '');
    document.getElementById('loggedStore').value = 'Store: ' + (json.employee.storeName || '');
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('userBar').classList.remove('hidden');
    document.getElementById('formArea').classList.remove('hidden');
    showMsg('Login successful');
  } catch(err) { showMsg(err.message, 'error'); }
}

document.getElementById('brand').addEventListener('change', populateSegmentOptions);
document.getElementById('segment').addEventListener('change', populateModels);

function updateInvoicePreview(files){
  const preview = document.getElementById('invoicePreview');
  preview.innerHTML = '';
  [...files].slice(0,7).forEach((file, i) => {
    const div = document.createElement('div');
    div.textContent = `${i+1}. ${file.name} | Original: ${Math.round(file.size/1024)} KB | Will compress on submit`;
    preview.appendChild(div);
  });
}
document.getElementById('invoiceImages').addEventListener('change', e => updateInvoicePreview(e.target.files));

function saveEntry(){
  const files = [...document.getElementById('invoiceImages').files].slice(0,7);
  const entry = {
    brand: document.getElementById('brand').value.trim(),
    segment: document.getElementById('segment').value.trim(),
    model: document.getElementById('model').value.trim(),
    price: document.getElementById('price').value.trim(),
    invoiceFileObjects: files,
    invoiceFilesMeta: files.map(f => ({name:f.name, size:f.size, type:f.type}))
  };
  if (!entry.brand || !entry.segment || !entry.model || !entry.price) { showMsg('Fill brand, segment, model number and price', 'error'); return; }
  savedEntries.push(entry);
  renderEntries();
  document.getElementById('brand').value = '';
  document.getElementById('segment').innerHTML = '<option value="">Select Segment</option>';
  document.getElementById('model').innerHTML = '<option value="">Select Model Number</option>';
  document.getElementById('price').value = '';
  document.getElementById('invoiceImages').value = '';
  document.getElementById('invoicePreview').innerHTML = '';
  showMsg('Entry saved locally');
}

function renderEntries(){
  const box = document.getElementById('entriesList');
  if (!savedEntries.length) { box.innerHTML = ''; return; }
  box.innerHTML = '<h3>Saved entries</h3>';
  savedEntries.forEach((e, i) => {
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `<b>${i+1}. ${e.brand}</b><br>Segment: ${e.segment}<br>Model: ${e.model}<br>Price: ${e.price}<br>Invoices: ${e.invoiceFilesMeta.length}`;
    box.appendChild(div);
  });
}

function loadImage(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function compressImage(file){
  const img = await loadImage(file);
  let width = img.width;
  let height = img.height;
  const ratio = Math.min(IMAGE_MAX_WIDTH / width, IMAGE_MAX_HEIGHT / height, 1);
  width = Math.round(width * ratio);
  height = Math.round(height * ratio);
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, width, height);
  const mimeType = 'image/jpeg';
  const dataUrl = canvas.toDataURL(mimeType, IMAGE_QUALITY);
  const estimatedBytes = Math.round((dataUrl.length - (dataUrl.indexOf(',') + 1)) * 3 / 4);
  return {
    name: file.name.replace(/\.[^.]+$/, '') + '.jpg',
    mimeType,
    dataUrl,
    originalSize: file.size,
    compressedSize: estimatedBytes,
    width,
    height
  };
}

async function submitFinal(){
  try {
    if (!loggedInEmployee) throw new Error('Please login first');
    if (savedEntries.length === 0) throw new Error('Please save at least one brand entry');
    showMsg('Compressing images and submitting...');
    const entriesPayload = [];
    let totalOriginal = 0;
    let totalCompressed = 0;
    for (const entry of savedEntries) {
      const invoiceImages = [];
      for (const f of entry.invoiceFileObjects) {
        const compressed = await compressImage(f);
        totalOriginal += compressed.originalSize;
        totalCompressed += compressed.compressedSize;
        invoiceImages.push(compressed);
      }
      entriesPayload.push({
        brand: entry.brand,
        segment: entry.segment,
        model: entry.model,
        price: entry.price,
        invoiceImages
      });
    }
    const payload = {
      promoterName: document.getElementById('promoterName').value,
      employeeCode: document.getElementById('employeeCode').value.trim(),
      storeName: document.getElementById('storeName').value,
      storeCode: document.getElementById('storeCode').value,
      dealerCategory: document.getElementById('dealerCategory').value,
      storeCity: document.getElementById('storeCity').value,
      storeAddress: document.getElementById('storeAddress').value,
      totalCounterDisplay: document.getElementById('totalCounterDisplay').value,
      daikinSplitDisplay: document.getElementById('daikinSplitDisplay').value,
      installationCharges: document.getElementById('installationCharges').value,
      pinelabActivation: document.getElementById('pinelabActivation').value,
      paytmActivation: document.getElementById('paytmActivation').value,
      paperFinance: document.getElementById('paperFinance').value,
      entries: entriesPayload
    };
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.message || json.error || 'Submit failed');
    const beforeKB = Math.round(totalOriginal/1024);
    const afterKB = Math.round(totalCompressed/1024);
    showMsg(`Final submit successful. Image size reduced from ${beforeKB} KB to ${afterKB} KB before upload.`);
    savedEntries = [];
    renderEntries();
  } catch(err) { showMsg(err.message, 'error'); }
}

populateBrandOptions();
</script>
</body>
</html>
